openapi: 3.1.0
info:
  title: eggAPP API
  version: 0.1.0
  description: >
    Smart Poultry Farm Management System API. Owner: backend-architect.
    Grows per Phase 1 increment — currently: first-run setup, auth, species
    reference, farms, incubators, devices. Conventions: JWT bearer auth
    (access 15 min / refresh 30 d, rotation via tokenVersion); all farm data
    scoped by membership (BR-013) — non-membership returns 404, never 403,
    so farm existence is not leaked; role gates: worker=read+field records,
    manager=configuration, owner=administration. Errors are always
    `{ error: { code, message } }`.

servers:
  - url: http://localhost:3001

tags:
  - name: system
  - name: setup
  - name: auth
  - name: reference
  - name: farms
  - name: incubators
  - name: devices
  - name: incubation
  - name: alerting
  - name: flocks
  - name: inventory
  - name: reports
  - name: members

paths:
  /health:
    get:
      tags: [system]
      summary: Liveness check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: ok }
                  service: { type: string, example: eggapp-api }

  /v1/setup:
    post:
      tags: [setup]
      summary: First-run wizard (US-FRM-001)
      description: Creates the Owner account and first farm. 409 once any user exists.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ownerName, email, password, farmName, timezone]
              properties:
                ownerName: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                farmName: { type: string }
                timezone: { type: string, example: Asia/Kolkata }
                location: { type: string }
      responses:
        "201":
          description: System initialized
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenPair"
                  - type: object
                    properties:
                      user: { $ref: "#/components/schemas/User" }
                      farm: { $ref: "#/components/schemas/Farm" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/setup/status:
    get:
      tags: [setup]
      summary: Whether first-run setup has been completed
      security: []
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                type: object
                properties:
                  initialized: { type: boolean }

  /v1/auth/login:
    post:
      tags: [auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        "200":
          description: Tokens + user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TokenPair"
                  - type: object
                    properties:
                      user: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/refresh:
    post:
      tags: [auth]
      summary: Exchange a refresh token for a new token pair
      description: Refresh tokens carry the user's tokenVersion; logout-all bumps it, revoking them all.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenPair" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/auth/logout-all:
    post:
      tags: [auth]
      summary: Revoke all refresh tokens (all devices)
      responses:
        "204": { description: Revoked }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/me:
    get:
      tags: [auth]
      summary: Current user with farm memberships
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/User"
                  - type: object
                    properties:
                      farms:
                        type: array
                        items: { $ref: "#/components/schemas/FarmWithRole" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/species:
    get:
      tags: [reference]
      summary: Species reference data (seeded from domain-knowledge §1)
      description: Drives batch schedule generation (BR-008) and stage-aware alert defaults (BR-006).
      responses:
        "200":
          description: All species
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Species" }

  /v1/farms:
    get:
      tags: [farms]
      summary: Farms the caller belongs to
      responses:
        "200":
          description: Farms with the caller's role
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FarmWithRole" }
    post:
      tags: [farms]
      summary: Create an additional farm (US-FRM-002)
      description: The caller becomes Owner of the new farm; existing farms/memberships are untouched. Default vaccination templates are seeded automatically, same as first-run setup.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, timezone]
              properties:
                name: { type: string, maxLength: 120 }
                timezone: { type: string }
                location: { type: string, maxLength: 200 }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/FarmWithRole" } } } }

  /v1/farms/{farmId}/incubators:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    post:
      tags: [incubators]
      summary: Register an incubator (US-INC-001) — manager+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, capacity]
              properties:
                name: { type: string }
                capacity: { type: integer, minimum: 1 }
                defaultSpeciesId: { type: string, example: chicken }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Incubator" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    get:
      tags: [incubators]
      summary: List incubators with bound-device summary
      responses:
        "200":
          description: Incubators
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Incubator" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/incubators/{id}:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    get:
      tags: [incubators]
      summary: Incubator detail (device + default species)
      responses:
        "200":
          description: Incubator
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Incubator" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [incubators]
      summary: Edit name/capacity/default species — manager+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 120 }
                capacity: { type: integer, minimum: 1 }
                defaultSpeciesId: { type: string, nullable: true }
      responses:
        "200": { description: Updated incubator, content: { application/json: { schema: { $ref: "#/components/schemas/Incubator" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/incubators/{id}/history:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    get:
      tags: [incubators]
      summary: Environmental history — 24h/7d/full-batch, with min/max/avg (US-ENV-002)
      parameters:
        - name: range
          in: query
          required: true
          schema: { type: string, enum: [24h, 7d, batch] }
        - name: batchId
          in: query
          description: Required when range=batch
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: History points (downsampled server-side to ≤500) + summary stats
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/incubators/{id}/config:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [incubators]
      summary: Push setpoints to the bound device over MQTT (US-INC-003) — manager+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: At least one field required. Only the fields present are changed on the device.
              properties:
                tempSetpoint: { type: number }
                tempHysteresis: { type: number }
                humSetpoint: { type: number }
                humHysteresis: { type: number }
      responses:
        "201":
          description: Created — DeviceConfig row in state "sent"
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { description: Broker not connected — command not sent }
    get:
      tags: [incubators]
      summary: Latest setpoint push + its ack state
      responses:
        "200":
          description: Latest DeviceConfig, or null if none yet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceConfig" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/devices:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    post:
      tags: [devices]
      summary: Register a device record — manager+
      description: >
        Creates the platform-side record (status `provisioned`). Physical
        provisioning (WiFi credentials, farm binding confirmation) happens via
        BLE per docs/iot/ble-pairing-protocol.md; MQTT broker credentials are
        currently issued manually per infra/docker/mosquitto/README.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hardwareId]
              properties:
                hardwareId: { type: string, description: "e.g. ESP32 MAC", example: "A0:B7:65:12:34:56" }
                name: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      tags: [devices]
      summary: List devices with binding summary
      responses:
        "200":
          description: Devices
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Device" }

  /v1/farms/{farmId}/devices/{id}/bind:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [devices]
      summary: Bind device to an incubator (BR-007) — manager+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [incubatorId]
              properties:
                incubatorId: { type: string, format: uuid }
      responses:
        "200":
          description: Bound (returns the incubator)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Incubator" }
        "409": { $ref: "#/components/responses/Conflict" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/devices/{id}/unbind:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [devices]
      summary: Unbind device from its incubator — manager+
      responses:
        "200": { description: Unbound }
        "409": { $ref: "#/components/responses/Conflict" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/devices/{id}/decommission:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [devices]
      summary: Decommission a device (US-DEV-004) — manager+
      description: Unbinds, marks decommissioned, records a DeviceEvent. Subsequent telemetry is rejected (BR-007). Idempotent.
      responses:
        "200":
          description: Decommissioned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Device" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/collections:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    post:
      tags: [incubation]
      summary: Record an egg collection (US-EGG-001) — field record, worker+
      description: >
        Offline-capable (BR-010): supply a client-generated `clientId` UUID;
        replaying the same clientId returns the original record with 200
        instead of duplicating. See docs/api/sync-conflict-strategy.md.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [collectedOn, count]
              properties:
                collectedOn: { type: string, format: date-time }
                count: { type: integer, minimum: 1 }
                avgWeightGrams: { type: number }
                sourceNote: { type: string }
                clientId: { type: string, format: uuid }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/EggCollection" } } } }
        "200": { description: Idempotent replay — original record, content: { application/json: { schema: { $ref: "#/components/schemas/EggCollection" } } } }
    get:
      tags: [incubation]
      summary: List collections with assigned/available counts
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EggCollection" }

  /v1/farms/{farmId}/collections/{id}/discard:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [incubation]
      summary: Discard eggs from a collection (US-EGG-004)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [count, reason]
              properties:
                count: { type: integer, minimum: 1 }
                reason: { type: string }
      responses:
        "200": { description: Updated collection }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/farms/{farmId}/batches:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    post:
      tags: [incubation]
      summary: Create a batch (US-BAT-001) — manager+
      description: >
        Snapshots the species' candling days (BR-008) and validates egg
        storage age (BR-011: >7 d returns warnings[], >14 d is rejected
        unless overrideNote is provided). Response is { batch, warnings }.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [incubatorId, speciesId, sources]
              properties:
                incubatorId: { type: string, format: uuid }
                speciesId: { type: string, example: chicken }
                sources:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [collectionId, count]
                    properties:
                      collectionId: { type: string, format: uuid }
                      count: { type: integer, minimum: 1 }
                overrideNote: { type: string }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  batch: { $ref: "#/components/schemas/EggBatch" }
                  warnings: { type: array, items: { type: string } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
    get:
      tags: [incubation]
      summary: List batches (optional ?status= filter)
      responses:
        "200":
          description: Batches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/EggBatch" }

  /v1/farms/{farmId}/batches/{id}:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    get:
      tags: [incubation]
      summary: Batch detail — sources, candlings, hatch (US-BAT-003 timeline data)
      responses:
        "200": { description: Batch with relations }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/batches/{id}/set:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [incubation]
      summary: Mark eggs physically set — computes the schedule (BR-008) — manager+
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                setAt: { type: string, format: date-time, description: Defaults to now }
      responses:
        "200": { description: Batch now incubating with lockdownAt/expectedHatchAt }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/farms/{farmId}/batches/{id}/status:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [incubation]
      summary: Manual lifecycle transition (BR-001) — manager+
      description: >
        Valid targets: setting, lockdown, hatching, aborted (reason
        required), closed. `incubating` must go through /set; `completed`
        only via /hatch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [setting, lockdown, hatching, aborted, closed] }
                reason: { type: string }
      responses:
        "200": { description: Updated batch }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/farms/{farmId}/batches/{id}/candlings:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [incubation]
      summary: Record a candling session (US-CAN-002) — field record, worker+
      description: >
        Only while `incubating` (BR-002). Viable count becomes
        fertile+unsure (BR-003); counts that don't sum to the current viable
        count require discrepancyNote. First session fixes fertilityPct
        (BR-015). Offline-capable via clientId (BR-010). One session per
        (batch, dayNo).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dayNo, candledAt, fertile, clear, bloodRing, unsure]
              properties:
                dayNo: { type: integer, minimum: 1 }
                candledAt: { type: string, format: date-time }
                fertile: { type: integer, minimum: 0 }
                clear: { type: integer, minimum: 0 }
                bloodRing: { type: integer, minimum: 0 }
                unsure: { type: integer, minimum: 0 }
                discrepancyNote: { type: string }
                clientId: { type: string, format: uuid }
      responses:
        "201": { description: "{ session, batch } with updated viableCount/fertilityPct" }
        "200": { description: Idempotent replay }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/farms/{farmId}/batches/{id}/hatch:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [incubation]
      summary: Record the hatch outcome (US-HAT-002/003) — field record, worker+
      description: >
        Allowed from lockdown/hatching, not before expectedHatch − 2 days
        (BR-008). Counts must reconcile against viable count or carry
        discrepancyNote (BR-003). Completes the batch and stores
        hatchOfSetPct / hatchOfFertilePct (BR-015). Offline-capable via
        clientId. One hatch event per batch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hatchedAt, hatched, pippedDead, deadInShell, unhatched]
              properties:
                hatchedAt: { type: string, format: date-time }
                hatched: { type: integer, minimum: 0 }
                pippedDead: { type: integer, minimum: 0 }
                deadInShell: { type: integer, minimum: 0 }
                unhatched: { type: integer, minimum: 0 }
                discrepancyNote: { type: string }
                clientId: { type: string, format: uuid }
      responses:
        "201": { description: "{ event, batch } — batch completed with metrics" }
        "200": { description: Idempotent replay }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /v1/farms/{farmId}/alerts:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    get:
      tags: [alerting]
      summary: List alerts (US-NOT-004), optional ?state= filter
      description: >
        Evaluated automatically from MQTT telemetry (BR-006): stage-aware
        bounds derived from Species by default (warning ±0.3°C from
        setpoint / species humidity range; critical at species temp
        min/max or ±10pp beyond the humidity range), or an AlertRule
        override if one exists for that incubator+metric. Critical fires
        immediately; warning requires the breach to persist for
        sustainMinutes (default 10). Only evaluated while the incubator
        has an active batch — no eggs, no alerts.
      parameters:
        - name: state
          in: query
          schema: { type: string, enum: [open, acked, resolved] }
      responses:
        "200":
          description: Alerts, newest first
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Alert" }

  /v1/farms/{farmId}/alerts/{id}/ack:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [alerting]
      summary: Acknowledge an open alert (US-NOT-003)
      description: No-op (returns unchanged) if the alert is already acked/resolved — safe to call more than once.
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Alert" }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/flocks:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    post:
      tags: [flocks]
      summary: Create a flock (US-FLK-001) — manager+
      description: >
        Exactly one origin is required: `hatchEventId` (must belong to a
        completed hatch not already linked to a flock), or
        `acquisitionDate` + `acquisitionAgeDays` for a manually-acquired
        flock (BR-009 traceability). `placedCount` is immutable after
        creation — see MortalityRecord for the only way counts change.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, speciesId, purpose, placedCount]
              properties:
                name: { type: string, maxLength: 120 }
                speciesId: { type: string, example: chicken }
                purpose: { type: string, enum: [layer, broiler, breeder] }
                placedCount: { type: integer, minimum: 1 }
                hatchEventId: { type: string, format: uuid }
                acquisitionDate: { type: string, format: date-time }
                acquisitionAgeDays: { type: integer, minimum: 0 }
                acquisitionNote: { type: string, maxLength: 300 }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/Flock" } } } }
        "400": { $ref: "#/components/responses/BadRequest" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: "Hatch event already linked to a flock", content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    get:
      tags: [flocks]
      summary: List flocks — includes derived age/stage/currentCount
      responses:
        "200":
          description: Flocks
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Flock" }

  /v1/farms/{farmId}/flocks/{id}:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    get:
      tags: [flocks]
      summary: Flock detail — mortality history, vaccination records, recent feed/water
      responses:
        "200": { description: Flock with relations, content: { application/json: { schema: { $ref: "#/components/schemas/FlockDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [flocks]
      summary: Edit name/species/purpose/provenance note — manager+
      description: Cosmetic/classification fields only — placedCount and origin (hatchEventId / acquisitionDate+acquisitionAgeDays) are immutable (BR-009 traceability).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 120 }
                speciesId: { type: string }
                purpose: { type: string, enum: [layer, broiler, breeder] }
                acquisitionNote: { type: string, maxLength: 300 }
      responses:
        "200": { description: Updated flock, content: { application/json: { schema: { $ref: "#/components/schemas/FlockDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/flocks/{id}/mortality:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [flocks]
      summary: Record mortality/cull/sale (US-FLK-003) — field record, worker+
      description: >
        BR-009: `currentCount` is always derived as `placedCount - sum(mortalityRecords.count)`,
        never edited directly. Rejects with 409 if `count` exceeds the
        flock's current remaining count. Offline-capable — supply a
        client-generated `clientId`; replaying it returns the original
        record with 200 instead of duplicating.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, count, cause]
              properties:
                date: { type: string, format: date-time }
                count: { type: integer, minimum: 1 }
                cause: { type: string, enum: [death, cull, sale] }
                notes: { type: string, maxLength: 300 }
                clientId: { type: string, format: uuid }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/MortalityRecord" } } } }
        "200": { description: Idempotent replay — original record }
        "409": { description: "count exceeds the flock's current remaining count", content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/farms/{farmId}/vaccination-templates:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    post:
      tags: [flocks]
      summary: Add a vaccination schedule template item (US-VAC-001) — manager+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [speciesId, purpose, ageDaysFrom, ageDaysTo, vaccine, disease, route]
              properties:
                speciesId: { type: string, example: chicken }
                purpose: { type: string, enum: [layer, broiler, breeder] }
                ageDaysFrom: { type: integer, minimum: 0 }
                ageDaysTo: { type: integer, minimum: 0 }
                vaccine: { type: string, maxLength: 120 }
                disease: { type: string, maxLength: 120 }
                route: { type: string, maxLength: 60 }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/VaccinationTemplateItem" } } } }
    get:
      tags: [flocks]
      summary: List a farm's vaccination schedule templates
      responses:
        "200":
          description: Template items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/VaccinationTemplateItem" }

  /v1/farms/{farmId}/vaccination-templates/seed-defaults:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    post:
      tags: [flocks]
      summary: Seed chicken layer/broiler templates from domain-knowledge §6 — manager+
      description: >
        No-op if the farm already has any chicken template item — never
        overwrites existing edits. Also called automatically once during
        first-run farm setup.
      responses:
        "204": { description: Seeded (or already present) }

  /v1/farms/{farmId}/vaccination-templates/{id}:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    patch:
      tags: [flocks]
      summary: Edit a vaccination schedule template item — manager+
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                speciesId: { type: string }
                purpose: { type: string, enum: [layer, broiler, breeder] }
                ageDaysFrom: { type: integer, minimum: 0 }
                ageDaysTo: { type: integer, minimum: 0 }
                vaccine: { type: string, maxLength: 120 }
                disease: { type: string, maxLength: 120 }
                route: { type: string, maxLength: 60 }
      responses:
        "200": { description: Updated item, content: { application/json: { schema: { $ref: "#/components/schemas/VaccinationTemplateItem" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [flocks]
      summary: Delete a vaccination schedule template item — manager+
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/flocks/{flockId}/vaccination/compliance:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/flockId" }
    get:
      tags: [flocks]
      summary: Vaccination compliance for a flock (US-VAC-002)
      description: >
        For each matching template item (by species/purpose/age range),
        computes `dueDate = birth + ageDaysFrom days` and a status:
        `administered` (a record references this template item),
        `overdue` (due date passed), `due` (within 24h of due), or
        `upcoming`. Drives the vaccination-due push reminder sweep.
      responses:
        "200":
          description: Compliance items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ComplianceItem" }

  /v1/farms/{farmId}/flocks/{flockId}/vaccination:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/flockId" }
    post:
      tags: [flocks]
      summary: Record a vaccination (US-VAC-003/004) — field record, worker+
      description: >
        BR-005: records are immutable. To correct one, submit a new
        record with `amendsRecordId` set to the record being corrected —
        the server resolves this to the true original if the referenced
        record is itself already an amendment, so a chain of corrections
        always stays one hop from the source. Offline-capable via
        `clientId` (idempotent replay, same as mortality).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, vaccine, disease, route, count, administeredBy]
              properties:
                templateItemId: { type: string, format: uuid, description: Links this record to a schedule item for compliance tracking }
                date: { type: string, format: date-time }
                vaccine: { type: string, maxLength: 120 }
                disease: { type: string, maxLength: 120 }
                manufacturer: { type: string, maxLength: 120 }
                lotNumber: { type: string, maxLength: 60 }
                expiry: { type: string, format: date-time }
                route: { type: string, maxLength: 60 }
                dose: { type: string, maxLength: 60 }
                count: { type: integer, minimum: 1 }
                administeredBy: { type: string, maxLength: 120 }
                reactions: { type: string, maxLength: 300 }
                nextDueDate: { type: string, format: date-time }
                amendsRecordId: { type: string, format: uuid }
                clientId: { type: string, format: uuid }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/VaccinationRecord" } } } }
        "200": { description: Idempotent replay — original record }

  /v1/farms/{farmId}/flocks/{flockId}/feed-logs:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/flockId" }
    post:
      tags: [flocks]
      summary: Log a feed check (US-FED-001/002) — field record, worker+
      description: >
        `stageMismatch` is computed server-side: a case-insensitive
        substring match between `feedType` and the flock's current
        stage's expected keyword (domain-knowledge §7) — non-blocking,
        surfaced as a warning badge only. Offline-capable via `clientId`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loggedAt, feedType, quantityKg]
              properties:
                loggedAt: { type: string, format: date-time }
                feedType: { type: string, maxLength: 120 }
                quantityKg: { type: number, exclusiveMinimum: 0 }
                clientId: { type: string, format: uuid }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/FeedLog" } } } }
        "200": { description: Idempotent replay — original record }
    get:
      tags: [flocks]
      summary: List feed logs for a flock, newest first
      responses:
        "200":
          description: Feed logs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/FeedLog" }

  /v1/farms/{farmId}/flocks/{flockId}/water-logs:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/flockId" }
    post:
      tags: [flocks]
      summary: Log a water check (US-WTR-001) — field record, worker+
      description: >
        Feeds the consumption-anomaly sweep (US-FED-003/US-WTR-002): a
        >20% drop vs. the 7-day trailing average, sustained across the 2
        most recent logs, raises a deduped Alert. Offline-capable via
        `clientId`. Note: the "spike alongside falling feed in hot
        weather" half of US-WTR-002 is out of scope — no ambient weather
        data source in this system.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loggedAt, quantityLiters]
              properties:
                loggedAt: { type: string, format: date-time }
                quantityLiters: { type: number, exclusiveMinimum: 0 }
                clientId: { type: string, format: uuid }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/WaterLog" } } } }
        "200": { description: Idempotent replay — original record }
    get:
      tags: [flocks]
      summary: List water logs for a flock, newest first
      responses:
        "200":
          description: Water logs
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/WaterLog" }

  /v1/farms/{farmId}/inventory:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    post:
      tags: [inventory]
      summary: Add a stock item (US-INV-001) — manager+
      description: Vaccine items require lotNumber + expiry — they feed vaccination records, where that provenance matters.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, name, unit, quantity]
              properties:
                kind: { type: string, enum: [feed, vaccine, consumable] }
                name: { type: string, maxLength: 120 }
                unit: { type: string, maxLength: 20, example: kg }
                quantity: { type: number, minimum: 0, description: Initial stock, recorded as a manual StockTransaction }
                lotNumber: { type: string, maxLength: 60 }
                expiry: { type: string, format: date-time }
                lowStockThreshold: { type: number, minimum: 0 }
      responses:
        "201": { description: Created, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryItem" } } } }
        "400": { description: "Vaccine item missing lotNumber/expiry", content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
    get:
      tags: [inventory]
      summary: List stock items
      responses:
        "200":
          description: Items
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/InventoryItem" }

  /v1/farms/{farmId}/inventory/{id}:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    get:
      tags: [inventory]
      summary: Item detail — includes the last 50 stock transactions
      responses:
        "200": { description: Item with transaction history, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryItemDetail" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [inventory]
      summary: Edit name/unit/lot/expiry/threshold — manager+
      description: kind and quantity aren't editable here — kind shouldn't change mid-life, and quantity only ever changes through the adjust endpoint or auto-deduction, so every change stays in the StockTransaction ledger.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 120 }
                unit: { type: string, maxLength: 20 }
                lotNumber: { type: string, maxLength: 60 }
                expiry: { type: string, format: date-time }
                lowStockThreshold: { type: number, minimum: 0 }
      responses:
        "200": { description: Updated item, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryItem" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [inventory]
      summary: Delete a stock item — manager+
      responses:
        "204": { description: Deleted }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/inventory/{id}/adjust:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { $ref: "#/components/parameters/id" }
    post:
      tags: [inventory]
      summary: Manual restock/correction — manager+
      description: >
        Auto-deductions (US-INV-002) happen instead through FeedLog/
        VaccinationRecord's optional inventoryItemId, inside the same
        transaction as that record — this endpoint is for manual
        adjustments only (restocking, corrections).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [delta]
              properties:
                delta: { type: number, description: "Positive to restock, negative to correct down. Never zero." }
                note: { type: string, maxLength: 300 }
      responses:
        "200": { description: Updated item, content: { application/json: { schema: { $ref: "#/components/schemas/InventoryItem" } } } }

  /v1/farms/{farmId}/reports/hatch-performance:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    get:
      tags: [reports]
      summary: Hatch performance across completed batches (US-RPT-001)
      description: >
        Per-batch metrics are read as stored at completion (BR-015 — never
        recomputed), plus the farm-wide average trend across the filtered
        set. Pass `format=csv` for a CSV download instead of JSON.
      parameters:
        - { name: speciesId, in: query, schema: { type: string } }
        - { name: incubatorId, in: query, schema: { type: string, format: uuid } }
        - { name: from, in: query, schema: { type: string, format: date-time } }
        - { name: to, in: query, schema: { type: string, format: date-time } }
        - { name: format, in: query, schema: { type: string, enum: [csv] } }
      responses:
        "200": { description: Report, content: { application/json: { schema: { $ref: "#/components/schemas/HatchPerformanceReport" } }, text/csv: {} } }

  /v1/farms/{farmId}/reports/environmental/{batchId}:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { name: batchId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      tags: [reports]
      summary: Environmental history + excursions for one batch (US-RPT-002)
      description: >
        Reuses the same per-batch telemetry window as the incubator
        history chart (range=batch), plus an excursion list derived from
        Alert (which already represents bound violations for that
        incubator — no separate excursion tracking needed). `format=csv`
        exports the excursions list.
      parameters:
        - { name: format, in: query, schema: { type: string, enum: [csv] } }
      responses:
        "200": { description: Report, content: { application/json: { schema: { $ref: "#/components/schemas/BatchEnvironmentReport" } }, text/csv: {} } }
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/farms/{farmId}/reports/vaccination-compliance:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    get:
      tags: [reports]
      summary: Farm-wide vaccination compliance (US-RPT-003)
      description: Aggregates the same per-flock computeCompliance() the flock detail page and due-reminder sweep use, across every flock in the farm.
      parameters:
        - { name: format, in: query, schema: { type: string, enum: [csv] } }
      responses:
        "200": { description: Report, content: { application/json: { schema: { $ref: "#/components/schemas/VaccinationComplianceReport" } }, text/csv: {} } }

  /v1/farms/{farmId}/reports/mortality-trends:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    get:
      tags: [reports]
      summary: Mortality by flock/stage/cause, benchmarked against domain-knowledge §5 norms (US-RPT-004)
      description: >
        Early-brooding cumulative mortality (≤14 days old) is flagged
        `elevated` past 5% of placedCount; ongoing mortality in the
        trailing 30 days is flagged `elevated` past 1% of the count at
        the start of that window — both per domain-knowledge.md §5.
      parameters:
        - { name: format, in: query, schema: { type: string, enum: [csv] } }
      responses:
        "200":
          description: Report
          content:
            application/json: { schema: { type: array, items: { $ref: "#/components/schemas/MortalityTrendRow" } } }
            text/csv: {}

  /v1/farms/{farmId}/members:
    parameters: [{ $ref: "#/components/parameters/farmId" }]
    get:
      tags: [members]
      summary: List a farm's members — manager+
      responses:
        "200": { description: Members, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Member" } } } } }
    post:
      tags: [members]
      summary: Invite a member to the farm (US-USR-002) — owner only
      description: >
        No email infrastructure exists in this system (personal-scale
        deployment, per nfr.md). An existing user is granted membership
        immediately; a brand-new user gets an account with a system-
        generated temporary password, returned once in this response —
        deliberately simple rather than token-based invite emails at
        this scale. The Owner shares it out-of-band.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [manager, worker] }
                name: { type: string, maxLength: 120, description: Only used if this creates a brand-new account }
      responses:
        "201": { description: Added, content: { application/json: { schema: { $ref: "#/components/schemas/InviteResult" } } } }
        "409": { description: Already a member, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /v1/farms/{farmId}/members/{userId}:
    parameters:
      - { $ref: "#/components/parameters/farmId" }
      - { name: userId, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      tags: [members]
      summary: Remove a member — owner only
      description: An owner cannot remove themself, and a farm's only owner cannot be removed (would orphan the farm).
      responses:
        "204": { description: Removed }
        "400": { description: Cannot remove self, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Last owner, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    farmId:
      name: farmId
      in: path
      required: true
      schema: { type: string, format: uuid }
    id:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    flockId:
      name: flockId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Validation failure
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: Missing/invalid/revoked token
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Forbidden:
      description: Role too low (BR-013)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Not found (includes non-membership — existence not leaked)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: State conflict (duplicate, occupied binding, already initialized)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, example: conflict }
            message: { type: string }

    TokenPair:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }

    Farm:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        timezone: { type: string }
        location: { type: string, nullable: true }

    FarmWithRole:
      allOf:
        - $ref: "#/components/schemas/Farm"
        - type: object
          properties:
            role: { type: string, enum: [owner, manager, worker] }

    Species:
      type: object
      description: Reference data — see packages/db seed and domain-knowledge §1.
      properties:
        id: { type: string, example: chicken }
        name: { type: string }
        incubationDays: { type: integer }
        lockdownOffsetDays: { type: integer }
        tempSetC: { type: number }
        tempMinC: { type: number }
        tempMaxC: { type: number }
        humidityIncubMinPct: { type: integer }
        humidityIncubMaxPct: { type: integer }
        humidityLockMinPct: { type: integer }
        humidityLockMaxPct: { type: integer }
        candlingDays: { type: array, items: { type: integer } }
        turnUntilDay: { type: integer }

    Device:
      type: object
      properties:
        id: { type: string, format: uuid }
        hardwareId: { type: string }
        name: { type: string, nullable: true }
        status: { type: string, enum: [provisioned, active, offline, decommissioned] }
        lastSeenAt: { type: string, format: date-time, nullable: true }
        firmwareVersion: { type: string, nullable: true }
        incubator:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            name: { type: string }

    Incubator:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        capacity: { type: integer }
        defaultSpeciesId: { type: string, nullable: true }
        deviceId: { type: string, format: uuid, nullable: true }
        device:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            hardwareId: { type: string }
            name: { type: string, nullable: true }
            status: { type: string }
            lastSeenAt: { type: string, format: date-time, nullable: true }
            currentTempSetpoint: { type: number, nullable: true, description: "Snapshot from telemetry's setTemp (US-INC-003)" }
            currentTempHysteresis: { type: number, nullable: true }
            currentHumSetpoint: { type: number, nullable: true }
            currentHumHysteresis: { type: number, nullable: true }
        latestTelemetry:
          type: object
          nullable: true
          description: Most recent reading for the bound device (null if none/unbound). Freshness — compare `ts` to now; no server-side staleness flag yet.
          properties:
            ts: { type: string, format: date-time }
            tempC: { type: number, nullable: true }
            humidityPct: { type: number, nullable: true }
            turnerOn: { type: boolean, nullable: true }
            source: { type: string, enum: [mqtt, ble] }

    DeviceConfig:
      type: object
      description: Setpoint push with sent → received → applied ack (US-INC-003). See docs/iot/mqtt-topics.md.
      properties:
        id: { type: string, format: uuid }
        version: { type: integer }
        payload:
          type: object
          properties:
            tempSetpoint: { type: number }
            tempHysteresis: { type: number }
            humSetpoint: { type: number }
            humHysteresis: { type: number }
        state: { type: string, enum: [sent, received, applied, unconfirmed] }
        sentAt: { type: string, format: date-time }
        receivedAt: { type: string, format: date-time, nullable: true }
        appliedAt: { type: string, format: date-time, nullable: true }

    EggCollection:
      type: object
      properties:
        id: { type: string, format: uuid }
        collectedOn: { type: string, format: date-time }
        count: { type: integer }
        discardedCount: { type: integer }
        discardNote: { type: string, nullable: true }
        avgWeightGrams: { type: number, nullable: true }
        sourceNote: { type: string, nullable: true }
        assignedCount: { type: integer, description: Present on list responses }
        availableCount: { type: integer, description: count − discarded − assigned }

    Alert:
      type: object
      properties:
        id: { type: string, format: uuid }
        incubatorId: { type: string, format: uuid, nullable: true }
        severity: { type: string, enum: [warning, critical] }
        state: { type: string, enum: [open, acked, resolved] }
        message: { type: string }
        triggeredAt: { type: string, format: date-time }
        ackedAt: { type: string, format: date-time, nullable: true }
        resolvedAt: { type: string, format: date-time, nullable: true }

    EggBatch:
      type: object
      properties:
        id: { type: string, format: uuid }
        incubatorId: { type: string, format: uuid }
        speciesId: { type: string }
        status:
          type: string
          enum: [planned, setting, incubating, lockdown, hatching, completed, closed, aborted]
        setAt: { type: string, format: date-time, nullable: true }
        candlingDays: { type: array, items: { type: integer } }
        lockdownAt: { type: string, format: date-time, nullable: true }
        expectedHatchAt: { type: string, format: date-time, nullable: true }
        viableCount: { type: integer }
        fertilityPct: { type: number, nullable: true }
        hatchOfSetPct: { type: number, nullable: true }
        hatchOfFertilePct: { type: number, nullable: true }
        abortReason: { type: string, nullable: true }
        storageOverrideNote: { type: string, nullable: true }

    Flock:
      type: object
      description: Phase 2 — see docs/architecture/domain-model.md "Flock Operations".
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        speciesId: { type: string, example: chicken }
        purpose: { type: string, enum: [layer, broiler, breeder] }
        placedCount: { type: integer, description: Immutable at creation (BR-009) }
        currentCount: { type: integer, description: "Derived: placedCount − sum(mortalityRecords.count). Never stored/edited directly." }
        acquisitionDate: { type: string, format: date-time, nullable: true }
        acquisitionAgeDays: { type: integer, nullable: true }
        acquisitionNote: { type: string, nullable: true }
        hatchEventId: { type: string, format: uuid, nullable: true }
        ageDays: { type: integer, nullable: true, description: Derived from hatch date or acquisition date − acquisitionAgeDays }
        stage:
          type: string
          nullable: true
          enum: [brooding, grower, pre_lay, layer, broiler_starter, broiler_grower, broiler_finisher]
          description: Derived from purpose + ageDays (US-FLK-002, domain-knowledge §5)

    FlockDetail:
      allOf:
        - $ref: "#/components/schemas/Flock"
        - type: object
          properties:
            mortalityRecords: { type: array, items: { $ref: "#/components/schemas/MortalityRecord" } }
            vaccinationRecords: { type: array, items: { $ref: "#/components/schemas/VaccinationRecord" } }
            recentFeed: { type: array, items: { $ref: "#/components/schemas/FeedLog" }, description: Most recent 10 }
            recentWater: { type: array, items: { $ref: "#/components/schemas/WaterLog" }, description: Most recent 10 }

    MortalityRecord:
      type: object
      properties:
        id: { type: string, format: uuid }
        flockId: { type: string, format: uuid }
        date: { type: string, format: date-time }
        count: { type: integer }
        cause: { type: string, enum: [death, cull, sale] }
        notes: { type: string, nullable: true }

    VaccinationTemplateItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        speciesId: { type: string, example: chicken }
        purpose: { type: string, enum: [layer, broiler, breeder] }
        ageDaysFrom: { type: integer }
        ageDaysTo: { type: integer }
        vaccine: { type: string }
        disease: { type: string }
        route: { type: string }

    VaccinationRecord:
      type: object
      description: Immutable (BR-005) — corrections are new records with amendsRecordId set.
      properties:
        id: { type: string, format: uuid }
        flockId: { type: string, format: uuid }
        templateItemId: { type: string, format: uuid, nullable: true }
        date: { type: string, format: date-time }
        vaccine: { type: string }
        disease: { type: string }
        manufacturer: { type: string, nullable: true }
        lotNumber: { type: string, nullable: true }
        expiry: { type: string, format: date-time, nullable: true }
        route: { type: string }
        dose: { type: string, nullable: true }
        count: { type: integer }
        administeredBy: { type: string }
        reactions: { type: string, nullable: true }
        nextDueDate: { type: string, format: date-time, nullable: true }
        amendsRecordId: { type: string, format: uuid, nullable: true, description: Always resolves to the true original record, one hop from the source }

    ComplianceItem:
      type: object
      description: One entry per matching VaccinationTemplateItem (US-VAC-002).
      properties:
        templateItemId: { type: string, format: uuid }
        vaccine: { type: string }
        disease: { type: string }
        route: { type: string }
        dueDate: { type: string, format: date-time }
        status: { type: string, enum: [administered, overdue, due, upcoming] }
        record: { $ref: "#/components/schemas/VaccinationRecord", description: Present when status is administered }

    FeedLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        flockId: { type: string, format: uuid }
        loggedAt: { type: string, format: date-time }
        feedType: { type: string }
        quantityKg: { type: number }
        stageMismatch: { type: boolean, description: "Non-blocking warning: feedType doesn't match the flock's current stage (US-FED-002)" }

    WaterLog:
      type: object
      properties:
        id: { type: string, format: uuid }
        flockId: { type: string, format: uuid }
        loggedAt: { type: string, format: date-time }
        quantityLiters: { type: number }

    InventoryItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        farmId: { type: string, format: uuid }
        kind: { type: string, enum: [feed, vaccine, consumable] }
        name: { type: string }
        unit: { type: string }
        quantity: { type: number, description: Current stock — updated transactionally alongside each StockTransaction }
        lotNumber: { type: string, nullable: true }
        expiry: { type: string, format: date-time, nullable: true }
        lowStockThreshold: { type: number, nullable: true }

    StockTransaction:
      type: object
      description: Audit ledger entry behind InventoryItem.quantity.
      properties:
        id: { type: string, format: uuid }
        itemId: { type: string, format: uuid }
        delta: { type: number, description: Negative = deduction, positive = restock/correction }
        cause: { type: string, enum: [feed_log, vaccination, manual] }
        refId: { type: string, nullable: true, description: FeedLog/VaccinationRecord id that triggered this, null for manual }
        note: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    InventoryItemDetail:
      allOf:
        - $ref: "#/components/schemas/InventoryItem"
        - type: object
          properties:
            transactions: { type: array, items: { $ref: "#/components/schemas/StockTransaction" }, description: Most recent 50 }

    HatchPerformanceReport:
      type: object
      properties:
        batches:
          type: array
          items:
            type: object
            properties:
              batchId: { type: string, format: uuid }
              speciesName: { type: string }
              incubatorName: { type: string }
              setAt: { type: string, format: date-time, nullable: true }
              hatchedAt: { type: string, format: date-time, nullable: true }
              viableCount: { type: integer }
              fertilityPct: { type: number, nullable: true }
              hatchOfSetPct: { type: number, nullable: true }
              hatchOfFertilePct: { type: number, nullable: true }
        trend:
          type: object
          properties:
            avgFertilityPct: { type: number, nullable: true }
            avgHatchOfSetPct: { type: number, nullable: true }
            avgHatchOfFertilePct: { type: number, nullable: true }

    BatchEnvironmentReport:
      type: object
      properties:
        batchId: { type: string, format: uuid }
        speciesName: { type: string }
        incubatorName: { type: string }
        range: { type: string }
        from: { type: string, format: date-time, nullable: true }
        to: { type: string, format: date-time, nullable: true }
        summary:
          type: object
          properties:
            temp: { type: object, properties: { min: { type: number, nullable: true }, max: { type: number, nullable: true }, avg: { type: number, nullable: true } } }
            humidity: { type: object, properties: { min: { type: number, nullable: true }, max: { type: number, nullable: true }, avg: { type: number, nullable: true } } }
        points:
          type: array
          items: { type: object, properties: { ts: { type: string, format: date-time }, tempC: { type: number, nullable: true }, humidityPct: { type: number, nullable: true } } }
        excursions:
          type: array
          items:
            type: object
            description: Derived from Alert rows for the batch's incubator within its set→hatch window.
            properties:
              severity: { type: string, enum: [warning, critical] }
              message: { type: string }
              triggeredAt: { type: string, format: date-time }
              resolvedAt: { type: string, format: date-time, nullable: true }
              durationMinutes: { type: integer, nullable: true }

    VaccinationComplianceReport:
      type: object
      properties:
        flocks:
          type: array
          items:
            type: object
            properties:
              flockId: { type: string, format: uuid }
              flockName: { type: string }
              items: { type: array, items: { $ref: "#/components/schemas/ComplianceItem" } }
        totals:
          type: object
          properties:
            administered: { type: integer }
            overdue: { type: integer }
            due: { type: integer }
            upcoming: { type: integer }

    MortalityTrendRow:
      type: object
      properties:
        flockId: { type: string, format: uuid }
        flockName: { type: string }
        stage: { type: string, nullable: true }
        placedCount: { type: integer }
        currentCount: { type: integer }
        byCause: { type: object, properties: { death: { type: integer }, cull: { type: integer }, sale: { type: integer } } }
        byMonth:
          type: array
          items: { type: object, properties: { month: { type: string, example: "2026-07" }, death: { type: integer }, cull: { type: integer }, sale: { type: integer } } }
        earlyMortality:
          type: object
          description: "Cumulative deaths by age ≤14 days (domain-knowledge §5) — status is elevated past 5% of placedCount."
          properties:
            deaths: { type: integer }
            status: { type: string, enum: [within_norm, elevated, unknown] }
        recentMonthlyMortality:
          type: object
          description: "Deaths in the trailing 30 days — status is elevated past 1% of the count at that window's start."
          properties:
            deaths: { type: integer }
            status: { type: string, enum: [within_norm, elevated, unknown] }

    Member:
      type: object
      properties:
        userId: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        role: { type: string, enum: [owner, manager, worker] }
        memberSince: { type: string, format: date-time }

    InviteResult:
      allOf:
        - $ref: "#/components/schemas/Member"
        - type: object
          properties:
            temporaryPassword: { type: string, description: Present only when this invite created a brand-new user account — shown once, never stored in retrievable form beyond the hash }
