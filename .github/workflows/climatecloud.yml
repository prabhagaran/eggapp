name: ClimateCloud CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──── Backend Tests & Build ────
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climatecloud/backend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: climatecloud/backend/package-lock.json

      - run: npm ci
      - run: npm run build --if-present

  # ──── Frontend Build ────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: climatecloud/frontend

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: climatecloud/frontend/package-lock.json

      - run: npm ci
      - run: npm run build

  # ──── Deploy to Staging ────
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Backend to Railway
        run: echo "Deploy backend to staging"
        # Add Railway/Render deployment here

      - name: Deploy Frontend to Vercel
        run: echo "Deploy frontend via Vercel Git integration"

  # ──── Deploy to Production ────
  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy Backend
        run: echo "Deploy backend to production"

      - name: Run Database Migrations
        run: echo "Run drizzle migrations"
