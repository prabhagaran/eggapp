site_name: Reusable Environmental Control Platform
site_description: ESP32 + FreeRTOS egg incubator / climate chamber platform (FW 2.0.0)
site_author: Prabhagaran

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
  palette:
    scheme: default
    primary: deep purple
    accent: deep purple

markdown_extensions:
  - admonition
  - attr_list
  - tables

nav:
  - Home: index.md

  - Overview:
      - Vision & Purpose: overview/vision.md
      - Design Philosophy: overview/design_philosophy.md
      - System Architecture: overview/system_architecture.md

  - Hardware:
      - Hardware Overview: hardware/hardware_overview.md
      - Pinout: hardware/pinout.md
      - Sensors: hardware/sensors.md
      - Actuators: hardware/actuators.md

  - Software:
      - Software Overview: software/software_overview.md
      - RTOS Architecture: software/rtos_architecture.md
      - Code Walkthrough: software/code_explanation.md
      - Profiles: software/profiles.md

  - User Interface:
      - UI Overview: ui/ui_overview.md
      - Button Mapping: ui/button_mapping.md

  - Safety & Logging:
      - Alarms & Faults: safety/alarms.md
      - Logging & Telemetry: safety/logging.md

  - Development:
      - Development Flow: development/development_flow.md
      - MVP Definition: development/mvp_definition.md
      - Roadmap: development/roadmap.md

  - Design Archive:
      - FSM Design Overview: software/fsm_design.md
      - FSM System Supervisor: software/fsm_system_supervisor.md
      - FSM Temperature: software/fsm_temperature.md
      - FSM Humidity: software/fsm_humidity.md
      - FSM Water Level: software/fsm_water.md
      - FSM Alarm: software/fsm_alarm.md
      - Nokia Style UI: ui/nokia_ui.md
      - Encoder Mapping (superseded): ui/encoder_mapping.md

  - Appendix:
      - Glossary: appendix/glossary.md
      - Future Expansion: appendix/future_expansion.md
