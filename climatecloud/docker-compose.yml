version: '3.8'

services:
  # ──── Backend API ────
  api:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis
      - mosquitto
    restart: unless-stopped
    networks:
      - climatecloud

  # ──── PostgreSQL ────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: climatecloud
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_change_me
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - climatecloud

  # ──── Redis ────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - climatecloud

  # ──── MQTT Broker (Mosquitto) ────
  mosquitto:
    image: eclipse-mosquitto:2.0.15
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    networks:
      - climatecloud

volumes:
  pgdata:
  mosquitto_data:
  mosquitto_log:

networks:
  climatecloud:
    driver: bridge
